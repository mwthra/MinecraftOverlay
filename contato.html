<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contato - Minecraft Overlay</title>
    <link rel="icon" type="image/png" href="img/BedWarsOverlayLogo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* CONFIGURAÇÕES GERAIS */
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: url("styles/gifs/contato.gif") no-repeat center center;
            background-size: cover;
        }

        .video-background video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .mc-font { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

        /* --- HEADER --- */
        .pixel-header {
            background: #1a1a1a;
            border-bottom: 4px solid #333;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            image-rendering: pixelated;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .header-logo-img {
            width: 32px;
            height: 32px;
            border: 1px solid #ff6600;
            border-radius: 2px;
        }

        .header-logo {
            color: #ff6600;
            font-size: 14px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 10px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #ff6600;
        }

        @media (max-width: 750px) {
            .pixel-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-wrapper {
            width: 100%;
            padding: 60px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .contact-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 92%;
            max-width: 800px;
        }

        .small-card {
            background: rgba(18, 18, 18, 0.85);
            border: 4px solid #333;
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 250px;
            height: 170px; 
            text-align: center;
            image-rendering: pixelated;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .small-card:hover {
            border-color: #ff6600;
            transform: translateY(-5px);
        }

        .pixel-title { 
            font-size: 1.8rem;
            color: #ff6600; 
            text-shadow: 2px 2px #000; 
            margin-top: 0px; 
            margin-bottom: 12px; 
        }

        .contact-icon { 
            width: 50px;
            height: 50px; 
            margin-bottom: 15px; 
            image-rendering: pixelated; 
        }

        .pixel-btn { 
            background: #ff6600; 
            color: #000; 
            border: 3px solid #000; 
            padding: 8px 12px;
            font-size: 10px; 
            cursor: pointer; 
            box-shadow: 3px 3px 0px #000;
            text-decoration: none; 
            display: inline-block; 
            width: 85%;
            transition: 0.1s;
        }

        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #000;
        }

        /* --- FOOTER --- */
        .pixel-footer {
            margin-top: auto;
            background: #121212;
            border-top: 4px solid #333;
            padding: 20px 10px;
            text-align: center;
            image-rendering: pixelated;
        }

        .footer-disclaimer {
            color: #555;
            font-size: 1.1rem;
            max-width: 800px;
            margin: 10px auto;
            line-height: 1.2;
        }

    </style>
</head>
<body>

<div class="video-background">
    <video autoplay muted loop playsinline poster="styles/gifs/contato.gif">
        <source src="videos/contato.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>
</div>

<header class="pixel-header">
    <a href="/" class="logo-container nav-link-click">
        <img src="img/BedWarsOverlayLogo.png" alt="Logo" class="header-logo-img">
        <span class="header-logo mc-font">Minecraft Overlay</span>
    </a>
    <nav class="nav-links mc-font">
        <a href="/">Início</a>
        <a href="downloads">Downloads</a>
        <a href="equipe">Equipe</a>
        <a href="contato">Contato</a>
        <a href="doacoes">Doações</a>
    </nav>
</header>

<div class="main-wrapper">
    <div class="contact-wrapper">
        <div class="small-card">
            <h2 class="pixel-title mc-font">DISCORD</h2>
            <img src="img/discord-logo.png" class="contact-icon" alt="Ícone Discord">
            <a href="https://discord.gg/GCYCrWHeJS" target="_blank" class="pixel-btn mc-font">ENTRAR NO SERVIDOR</a>
        </div>

        <div class="small-card">
            <h2 class="pixel-title mc-font">EMAIL</h2>
            <img src="img/gmail-logo.png" class="contact-icon" alt="Ícone Gmail">
            <a href="mailto:contato.mothra@gmail.com" class="pixel-btn mc-font">ENVIAR EMAIL</a>
        </div>
    </div>
</div>

<footer class="pixel-footer">
    <div class="mc-font" style="color: #ff6600; font-size: 10px; margin-bottom: 5px;">Minecraft Overlay © 2026</div>
    <div class="footer-disclaimer">
        Este projeto é um conteúdo independente feito por fãs. Não somos afiliados, associados, autorizados ou endossados pela Microsoft Corporation ou Mojang Synergies AB.
    </div>
</footer>

<script>
    const clickSound = new Audio('sons/minecraft-click.mp3');

    function playClick() {
        clickSound.currentTime = 0;
        clickSound.play();
    }

    window.onload = function() {
        const clickableItems = document.querySelectorAll('.pixel-btn, .nav-links a, .logo-container');
        
        clickableItems.forEach(item => {
            item.addEventListener('click', function(e) {
                const target = this.getAttribute('href');
                const isBlank = this.getAttribute('target') === '_blank';

                if (target && !target.startsWith('#') && !isBlank && !target.startsWith('mailto:')) {
                    e.preventDefault();
                    playClick();
                    setTimeout(() => {
                        window.location.href = target;
                    }, 150);
                } else {
                    playClick();
                }
            });
        });
    };
</script>

</body>
</html>
